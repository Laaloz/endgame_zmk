# Endgame Split — firmware-asetukset
# HUOM: Zephyr .conf ei salli rivinsisäisiä kommentteja arvon perässä
# (esim. "CONFIG_X=900000  # selite"). Kommentit omalle riville.

# Langaton / virransäästö
CONFIG_ZMK_SLEEP=y
# Lepotila 15 min (900000 ms) käyttämättömyyden jälkeen
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Akkuraportointi (nice!nano lukee P0.04 kautta)
CONFIG_ZMK_BATTERY_REPORTING=y

# BLE
# Täyttä lähetystehoa ei aseteta tässä: CONFIG_BT_CTLR_TX_PWR_PLUS_8 kuuluu
# Zephyrin ohjelmisto-BLE-ohjaimeen, mutta nice!nano käyttää Nordicin
# SoftDevice-ohjainta -> valinta ei ole aktiivinen ja kaataisi käännöksen.

# ZMK Studio -tuki (keymapin muokkaus ilman uudelleenflashausta)
CONFIG_ZMK_STUDIO=y

# Debounce (Choc + hotswap)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=4
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=6
