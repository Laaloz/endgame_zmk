# Endgame Split — firmware settings
# NOTE: Zephyr .conf does not allow inline comments after a value
# (e.g. "CONFIG_X=900000  # note"). Keep comments on their own line.

# Wireless / power saving
CONFIG_ZMK_SLEEP=y
# Deep sleep after 15 min (900000 ms) of inactivity
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Battery reporting (nice!nano reads via P0.04)
CONFIG_ZMK_BATTERY_REPORTING=y

# BLE
# Max TX power is intentionally not set here: CONFIG_BT_CTLR_TX_PWR_PLUS_8
# belongs to Zephyr's software BLE controller, but the nice!nano uses
# Nordic's SoftDevice controller -> the choice is inactive and would abort
# the build.

# ZMK Studio support (edit the keymap without reflashing)
CONFIG_ZMK_STUDIO=y

# Debounce (Choc + hotswap)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=4
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=6
